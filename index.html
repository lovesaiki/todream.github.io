<!DOCTYPE html>
<html>
<head>
  <title>To Dream</title>

  <style>
    /* 🌊 PALE AQUA BACKGROUND */
    body {
      background-color: #bfeeee;
      margin: 0;
      font-family: Playfair Display, serif;
    }

    /* ✍️ AUTHOR MESSAGE BOX */
    .author-box {
      margin: 20px;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      text-align: center;
    }

    .author-box h2 {
      margin-bottom: 10px;
    }

    /* 📚 TITLE */
    h1 {
      text-align: center;
      margin-top: 10px;
    }

     /* 📚 GRID (2 PER ROW) */
    .story-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr); 
      gap: 20px;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    /* 📦 STORY CARD */
    .story-card {
      text-decoration: none;
      color: black;
      text-align: center;
      transition: 0.2s;
    }

    /* 🖼️ COVER IMAGE */
    .story-card img {
  width: 100%;
  height: 400px;   
  object-fit: cover;
  border-radius: 12px;
}

    /* ✨ HOVER EFFECT */
    .story-card:hover img {
      transform: scale(1.05);
    }

    .story-card p {
      margin-top: 10px;
      font-weight: bold;
    }

    /* 📱 TABLET */
    @media (max-width: 768px) {
      .story-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* 📱 PHONE */
    @media (max-width: 480px) {
      .story-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- ✍️ AUTHOR MESSAGE -->
  <div class="author-box">
    <h2>Love, Saiki</h2>
    <p>
      Welcome to my little space where I share my stories. ✨<br>
      Every story here is made with effort and emotion, and I hope you find something meaningful in them.<br>
      Thank you for reading 💖
    </p>
  </div>

  <h1>To Dream</h1>

  <!-- 📚 STORIES -->
  <div class="story-container">

    <a href="betting-despite-odds.html" class="story-card">
      <img src="betting-despite-odds.jpg.jpg">
      <p>Betting Despite Odds</p>
    </a>

    <a href="bus-and-letters.html" class="story-card">
      <img src="bus-and-letters.jpg">
      <p>Bus and Letters</p>
    </a>

    <a href="hopelessly-romantic-love.html" class="story-card">
      <img src="hopelessly-romantic-love.jpg">
      <p>Hopelessly Romantic Love</p>
    </a>

    <a href="tacenda-:-a-love-we-never-named.html" class="story-card">
      <img src="tacenda-a-lov-ewe-never-named.jpg">
      <p>Tacenda: A Love We Never Named</p>
    </a>

  </div>

</body>
</html>
