<!DOCTYPE html>
<html>
<head>
  <title>Saiki's Works</title>

  <style>
    /* 🌟 3-COLUMN GRID */
    .story-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    /* 📦 STORY CARD */
    .story-card {
      text-decoration: none;
      color: black;
      text-align: center;
      font-family: Arial, sans-serif;
      transition: 0.2s;
    }

    /* 🖼️ COVER IMAGE */
    .story-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    /* ✨ HOVER EFFECT */
    .story-card:hover img {
      transform: scale(1.05);
    }

    .story-card p {
      margin-top: 10px;
      font-weight: bold;
    }

    /* 📱 TABLET */
    @media (max-width: 768px) {
      .story-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* 📱 PHONE */
    @media (max-width: 480px) {
      .story-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1 style="text-align:center;">Saiki's Works</h1>

    </a>

  </div>

</body>
</html>
